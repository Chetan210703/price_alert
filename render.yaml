services:
  # Recommended: Docker deploy — Playwright browsers + system libs included
  - type: web
    name: price-alert-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "3001"

  # Alternative: native Node (only if you don't use Docker)
  # - type: web
  #   name: price-alert-api
  #   runtime: node
  #   rootDir: backend
  #   buildCommand: npm install
  #   startCommand: npm start
